# ============================================
# Docker Compose - PQC Cloud Storage
# ============================================
# Two services: frontend (Next.js) + backend (Express)
# Cryptography runs in the browser.
# MongoDB is external (MongoDB Atlas). R2 is Cloudflare managed.
#
# Usage:
#   docker compose up --build          # start both services
#   docker compose up frontend         # frontend only
#   docker compose up backend          # backend only
#   docker compose down                # stop and remove containers
# ============================================

